<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <g transform="translate(48, 48)">
    <!-- Harsh Brutalist Shadow -->
    <rect x="32" y="32" width="384" height="384" fill="#111111" />
    
    <!-- Main Pink Square Background -->
    <rect x="0" y="0" width="384" height="384" fill="#FF2E63" stroke="#111111" stroke-width="24" />
    
    <!-- Blue Triangle -->
    <polygon points="40,344 192,40 344,344" fill="#08D9D6" stroke="#111111" stroke-width="24" stroke-linejoin="miter" />
    
    <!-- Yellow Circle -->
    <circle cx="192" cy="240" r="80" fill="#FFD400" stroke="#111111" stroke-width="24" />
    
    <!-- Inner Black Dot -->
    <circle cx="192" cy="240" r="24" fill="#111111" />
  </g>
</svg>